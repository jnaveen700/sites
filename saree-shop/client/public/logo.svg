<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#3d1f2d" stroke="#d4a574" stroke-width="4"/>

  <!-- Decorative circles in corners -->
  <circle cx="180" cy="30" r="8" fill="#d4a574" opacity="0.6"/>
  <circle cx="20" cy="170" r="8" fill="#d4a574" opacity="0.6"/>

  <!-- Lamp/Diya shape in center -->
  <ellipse cx="100" cy="80" rx="20" ry="25" fill="#d4a574" opacity="0.8"/>
  <path d="M 85 105 Q 85 120 100 125 Q 115 120 115 105" fill="#d4a574" opacity="0.8"/>

  <!-- Top decoration -->
  <polygon points="100,30 95,50 105,50" fill="#d4a574" opacity="0.9"/>

  <!-- Saree fold pattern suggestion -->
  <path d="M 65 140 Q 75 160 100 155 Q 125 160 135 140"
        stroke="#d4a574" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Text - Brand name -->
  <text x="100" y="185" font-family="serif" font-size="14"
        font-weight="bold" text-anchor="middle" fill="#d4a574" letter-spacing="2">
    SAREE SHOP
  </text>
</svg>